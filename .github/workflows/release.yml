name: Release RentFlow

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}
        run: npm run tauri:build

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create release in rentflow-releases
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.VERSION }}"

          # Vytvoř release přes GitHub API
          $body = @{
            tag_name = $tag
            name = "RentFlow v$version"
            body = "## Co je nového v této verzi`nViz changelog v aplikaci."
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $headers = @{
            Authorization = "token $env:RELEASES_TOKEN"
            Accept = "application/vnd.github.v3+json"
          }

          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/burgerondrej/rentflow-releases/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
          $uploadUrl = $release.upload_url -replace '\{.*\}', ''

          # Upload souborů
          $files = @(
            (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1),
            (Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip | Select-Object -First 1),
            (Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip.sig | Select-Object -First 1),
            (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1),
            (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi.zip | Select-Object -First 1),
            (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi.zip.sig | Select-Object -First 1)
          )

          foreach ($file in $files) {
            $uploadUri = "$uploadUrl`?name=$($file.Name)"
            Invoke-RestMethod -Uri $uploadUri -Method Post -Headers $headers -InFile $file.FullName -ContentType "application/octet-stream"
            Write-Host "Uploaded: $($file.Name)"
          }

          # Ulož upload URL pro další krok
          echo "RELEASE_ID=$($release.id)" >> $env:GITHUB_OUTPUT
          echo "UPLOAD_URL=$uploadUrl" >> $env:GITHUB_OUTPUT
        id: create_release

      - name: Generate and upload update manifest
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "${{ github.ref_name }}"

          $headers = @{
            Authorization = "token $env:RELEASES_TOKEN"
            Accept = "application/vnd.github.v3+json"
          }

          $nsisSig = Get-Content "$(Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip.sig | Select-Object -First 1)" -Raw
          $msiSig = Get-Content "$(Get-ChildItem src-tauri/target/release/bundle/msi/*.msi.zip.sig | Select-Object -First 1)" -Raw

          # Načti asset IDs z API (nutné pro private repo download)
          $releaseInfo = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/burgerondrej/rentflow-releases/releases/tags/$tag" `
            -Headers $headers

          $nsisAsset = $releaseInfo.assets | Where-Object { $_.name -like "*.nsis.zip" } | Select-Object -First 1
          $msiAsset  = $releaseInfo.assets | Where-Object { $_.name -like "*.msi.zip"  } | Select-Object -First 1

          $nsisUrl = "https://api.github.com/repos/burgerondrej/rentflow-releases/releases/assets/$($nsisAsset.id)"
          $msiUrl  = "https://api.github.com/repos/burgerondrej/rentflow-releases/releases/assets/$($msiAsset.id)"

          Write-Host "NSIS asset ID: $($nsisAsset.id) -> $nsisUrl"
          Write-Host "MSI asset ID:  $($msiAsset.id) -> $msiUrl"

          $manifest = @{
            version = $version
            notes = "Co je nového v této verzi: viz changelog v aplikaci."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisSig.Trim()
                url = $nsisUrl
              }
              "windows-x86_64-nsis" = @{
                signature = $nsisSig.Trim()
                url = $nsisUrl
              }
              "windows-x86_64-msi" = @{
                signature = $msiSig.Trim()
                url = $msiUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          # Push do rentflow-updates GitHub Pages
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://burgerondrej:$env:PAGES_TOKEN@github.com/burgerondrej/rentflow-updates.git pages-repo
          Copy-Item latest.json pages-repo/latest.json -Force
          cd pages-repo
          git add latest.json
          git commit -m "Update manifest to $tag"
          git push
