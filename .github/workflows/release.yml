name: Release RentFlow

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RentFlow v${{ steps.version.outputs.VERSION }}
          body: |
            ## Co je nového v této verzi
            Viz popis níže nebo changelog v aplikaci.
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig

      - name: Generate update manifest
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          $tag = "${{ github.ref_name }}"
          $base = "https://github.com/burgerondrej/rentflow/releases/download/$tag"

          $nsisSig = Get-Content "$(Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip.sig | Select-Object -First 1)" -Raw
          $msiSig = Get-Content "$(Get-ChildItem src-tauri/target/release/bundle/msi/*.msi.zip.sig | Select-Object -First 1)" -Raw
          $nsisFile = (Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip | Select-Object -First 1).Name
          $msiFile = (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi.zip | Select-Object -First 1).Name

          $manifest = @{
            version = $version
            notes = "## Co je nového v této verzi`nViz popis níže nebo changelog v aplikaci."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisSig.Trim()
                url = "$base/$nsisFile"
              }
              "windows-x86_64-nsis" = @{
                signature = $nsisSig.Trim()
                url = "$base/$nsisFile"
              }
              "windows-x86_64-msi" = @{
                signature = $msiSig.Trim()
                url = "$base/$msiFile"
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Upload manifest to rentflow-updates
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://burgerondrej:$env:PAGES_TOKEN@github.com/burgerondrej/rentflow-updates.git pages-repo
          Copy-Item latest.json pages-repo/latest.json -Force
          cd pages-repo
          git add latest.json
          git commit -m "Update manifest to ${{ github.ref_name }}"
          git push
