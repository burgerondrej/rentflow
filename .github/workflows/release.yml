name: Release RentFlow

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RentFlow ${{ github.ref_name }}'
          releaseBody: 'Viz changelog v aplikaci.'
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri

      - name: Upload to rentflow-releases and push latest.json
        shell: pwsh
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $zipFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip" | Select-Object -First 1
          $sigFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          if (-not $zipFile) { throw "NSIS zip not found in $nsisDir" }
          if (-not $sigFile) { throw "Signature file not found in $nsisDir" }

          $zipName    = $zipFile.Name
          $signature  = (Get-Content $sigFile.FullName -Raw).Trim()
          $version    = $env:TAG
          $pubDate    = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/burgerondrej/rentflow-releases/releases/download/$version/$zipName"

          $headers = @{
            Authorization = "token $($env:RELEASES_TOKEN)"
            "User-Agent"  = "GitHub-Actions"
            Accept        = "application/vnd.github.v3+json"
          }

          # --- Create release in rentflow-releases (public repo) ---
          $releasePayload = @{
            tag_name   = $version
            name       = "RentFlow $version"
            body       = "RentFlow $version"
            draft      = $false
            prerelease = $false
          } | ConvertTo-Json

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/burgerondrej/rentflow-releases/releases" `
            -Method Post -Headers $headers -Body $releasePayload -ContentType "application/json"

          # --- Upload .nsis.zip to the release ---
          $uploadUrl = ($release.upload_url -replace '\{.*\}', '') + "?name=$zipName"
          $bytes = [IO.File]::ReadAllBytes($zipFile.FullName)
          Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $headers `
            -Body $bytes -ContentType "application/octet-stream"

          Write-Host "Uploaded: $zipName -> $downloadUrl"

          # --- Build latest.json ---
          $latestJson = [ordered]@{
            version  = $version
            notes    = "RentFlow $version"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          Write-Host "latest.json content:"
          Write-Host $latestJson

          # --- Push latest.json to rentflow-updates ---
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone "https://x-access-token:$($env:PAGES_TOKEN)@github.com/burgerondrej/rentflow-updates.git" updates-repo

          [IO.File]::WriteAllText(
            "$PWD\updates-repo\latest.json",
            $latestJson,
            [Text.Encoding]::UTF8
          )

          Push-Location updates-repo
          git add latest.json
          git commit -m "Update to $version"
          git push
          Pop-Location

          Write-Host "latest.json pushed to rentflow-updates"
